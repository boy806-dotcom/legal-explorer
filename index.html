<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>구성요건 판례 탐색기</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; background: #060a14; color: #e2e8f0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", sans-serif;
    min-height: 100vh;
  }
  .app { display: flex; min-height: 100vh; }

  /* 사이드바 */
  .sidebar {
    width: 280px; background: #0a0f1c;
    border-right: 1px solid #1a2240;
    flex-shrink: 0; position: sticky; top: 0;
    height: 100vh; overflow-y: auto; z-index: 50;
  }
  .sidebar-header {
    padding: 18px 16px 16px; border-bottom: 1px solid #1a2240;
    display: flex; align-items: center; gap: 10px;
  }
  .logo {
    width: 32px; height: 32px; border-radius: 8px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .logo-text { font-size: 15px; font-weight: 800; color: #f1f5f9; }
  .logo-sub { font-size: 10px; color: #64748b; margin-top: 1px; }
  .close-sidebar {
    display: none; margin-left: auto; background: transparent;
    border: none; color: #64748b; font-size: 20px; cursor: pointer; padding: 4px 8px;
  }

  .cat-header {
    padding: 14px 20px 10px; cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    user-select: none; border-top: 1px solid #12182a;
  }
  .cat-header:first-child { border-top: none; }
  .cat-icon { font-size: 13px; }
  .cat-name {
    font-size: 12px; color: #94a3b8; font-weight: 800;
    letter-spacing: 0.6px; text-transform: uppercase; flex: 1;
  }
  .cat-arrow { font-size: 10px; color: #475569; transition: transform 0.2s; }
  .cat-arrow.open { transform: rotate(90deg); }
  .cat-items { display: none; padding-bottom: 8px; }
  .cat-items.open { display: block; }

  .law-item {
    display: block; padding: 10px 20px 10px 36px; cursor: pointer;
    border-left: 3px solid transparent; transition: all 0.15s;
  }
  .law-item:hover { background: #111827; }
  .law-item.active { background: #111827; border-left-color: #8b5cf6; }
  .law-item-title {
    font-size: 13.5px; font-weight: 700; color: #e2e8f0; letter-spacing: -0.2px;
  }
  .law-item.active .law-item-title { color: #a5b4fc; }
  .law-item-sub { font-size: 10.5px; color: #64748b; margin-top: 2px; }

  /* 메인 */
  .main { flex: 1; min-width: 0; padding: 28px 32px 80px; max-width: 820px; }
  .mobile-header {
    display: none; padding: 14px 16px; background: #0a0f1c;
    border-bottom: 1px solid #1a2240; align-items: center; gap: 10px;
    position: sticky; top: 0; z-index: 40;
  }
  .hamburger {
    background: #1e293b; border: 1px solid #334155; color: #cbd5e1;
    width: 36px; height: 36px; border-radius: 8px; font-size: 18px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .mobile-title {
    font-size: 14px; font-weight: 700; color: #e2e8f0;
    flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .law-title-sm { font-size: 12px; color: #6366f1; font-weight: 800; margin-bottom: 4px; letter-spacing: 0.3px; }
  .law-title-lg { font-size: 22px; font-weight: 800; color: #f1f5f9; letter-spacing: -0.5px; margin-bottom: 18px; }
  .article-box {
    background: #111827; border: 1px solid #1a2240;
    border-radius: 14px; padding: 24px 22px; margin-bottom: 24px;
    line-height: 2.1; font-size: 16.5px;
  }
  .article-box .text { color: #cbd5e1; }
  .term {
    color: #a5b4fc; background: #6366f115;
    padding: 3px 9px; border-radius: 6px; cursor: pointer;
    font-weight: 700; border-bottom: 2px dashed #6366f150;
    transition: all 0.2s; display: inline;
  }
  .term:hover { background: #6366f125; }
  .term.active {
    color: #fff; background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border-bottom: none;
  }

  .hint { text-align: center; padding: 36px 16px 8px; color: #475569; }
  .hint-icon { font-size: 28px; margin-bottom: 12px; }
  .hint-title { font-size: 14px; font-weight: 700; color: #94a3b8; margin-bottom: 6px; }
  .hint-desc { font-size: 12px; line-height: 1.7; color: #64748b; }

  .term-header {
    background: linear-gradient(135deg, #1a1f3a, #0f1629);
    border: 1px solid #2a2f5a; border-radius: 14px;
    padding: 20px 22px; margin-bottom: 16px;
  }
  .term-label { font-size: 11px; color: #a78bfa; font-weight: 800; letter-spacing: 0.5px; margin-bottom: 6px; }
  .term-name { font-size: 20px; font-weight: 800; color: #f1f5f9; margin-bottom: 12px; letter-spacing: -0.4px; }
  .term-desc { font-size: 14px; color: #cbd5e1; line-height: 1.8; padding-top: 12px; border-top: 1px solid #2a2f5a; }
  .field-note {
    margin-top: 12px; padding: 10px 12px;
    background: #78350f15; border-left: 3px solid #f59e0b;
    border-radius: 6px; font-size: 13px; color: #fbbf24; line-height: 1.7;
  }

  .section-title {
    font-size: 13px; color: #64748b; font-weight: 800;
    margin: 20px 4px 10px; display: flex; align-items: center; gap: 8px;
  }
  .count-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; }
  .count-sup { background: #dc262620; color: #f87171; }
  .count-api { background: #05966910; color: #10b981; border: 1px solid #05966930; }

  .case-card {
    background: #111827; border: 1px solid #1a2240;
    border-radius: 12px; padding: 14px 16px; margin-bottom: 8px;
    cursor: pointer; transition: all 0.2s;
  }
  .case-card:hover { border-color: #6366f140; }
  .case-card.expanded { background: #151c30; border-color: #6366f130; }
  .case-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .case-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; flex-wrap: wrap; }
  .court-tag { font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 800; }
  .court-sc { background: #dc262620; color: #f87171; }
  .court-lc { background: #6366f115; color: #818cf8; }
  .case-date { font-size: 11px; color: #475569; }
  .case-no { font-size: 15px; font-weight: 700; color: #e2e8f0; letter-spacing: -0.2px; }
  .case-name { font-size: 12px; color: #94a3b8; margin-top: 3px; line-height: 1.5; }
  .arrow { font-size: 14px; color: #475569; transition: transform 0.2s; flex-shrink: 0; margin-top: 3px; }
  .arrow.up { transform: rotate(180deg); }
  .key-point {
    display: inline-block; background: #6366f110; border: 1px solid #6366f125;
    color: #a5b4fc; font-size: 12px; font-weight: 600;
    padding: 5px 11px; border-radius: 20px; margin-top: 10px; line-height: 1.4;
  }
  .case-body { margin-top: 14px; }
  .case-summary { background: #0c1020; border-radius: 8px; padding: 14px 16px; }
  .summary-label { font-size: 11px; color: #a78bfa; font-weight: 800; margin-bottom: 8px; }
  .summary-text { font-size: 13.5px; color: #cbd5e1; line-height: 1.85; white-space: pre-wrap; }
  .actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .btn {
    background: #1e293b; border: 1px solid #334155; color: #94a3b8;
    font-size: 12px; font-weight: 700; padding: 8px 14px; border-radius: 8px; cursor: pointer;
  }
  .btn:hover { background: #263449; }
  .btn.success { background: #059669; border-color: #059669; color: #fff; }
  .loading { text-align: center; padding: 24px; color: #64748b; font-size: 13px; }
  .spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid #1e293b; border-top-color: #6366f1;
    border-radius: 50%; animation: spin 0.8s linear infinite;
    margin-right: 8px; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error {
    background: #7f1d1d20; border: 1px solid #7f1d1d50;
    color: #fca5a5; padding: 12px 14px; border-radius: 8px; font-size: 12px; margin: 8px 0;
  }
  .empty-hint { text-align: center; padding: 20px 16px; color: #475569; font-size: 12px; line-height: 1.7; }
  .footer {
    margin-top: 40px; padding: 16px; background: #0f172a;
    border: 1px solid #1e2a4a; border-radius: 10px;
    font-size: 11px; color: #475569; line-height: 1.7; text-align: center;
  }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 45; }

  @media (max-width: 900px) {
    .app { flex-direction: column; }
    .mobile-header { display: flex; }
    .sidebar {
      position: fixed; left: -300px; top: 0;
      transition: left 0.25s ease; box-shadow: 4px 0 24px rgba(0,0,0,0.5);
    }
    .sidebar.open { left: 0; }
    .overlay.show { display: block; }
    .close-sidebar { display: block; }
    .main { padding: 20px 16px 60px; }
    .article-box { padding: 20px 18px; font-size: 15.5px; line-height: 2; }
    .law-title-lg { font-size: 19px; }
  }
</style>
</head>

// ============================================
// 상태
// ============================================
let state = {
  currentLaw: "k257",
  selectedTerm: null,
  expandedCase: null,
  apiResults: null,
  apiLoading: false,
  apiError: null,
  openCategories: {}
};

// 기본 펼침
CATEGORIES.forEach((c, i) => { if (c.defaultOpen) state.openCategories[i] = true; });

// ============================================
// 렌더링
// ============================================
function renderSidebar() {
  const el = document.getElementById("sidebar-content");
  el.innerHTML = CATEGORIES.map((cat, i) => {
    const isOpen = state.openCategories[i];
    return `
      <div class="cat-header" onclick="toggleCategory(${i})">
        <span class="cat-icon">${cat.icon}</span>
        <span class="cat-name">${cat.name}</span>
        <span class="cat-arrow ${isOpen ? "open" : ""}">▶</span>
      </div>
      <div class="cat-items ${isOpen ? "open" : ""}">
        ${cat.items.map(item => `
          <div class="law-item ${state.currentLaw === item.key ? "active" : ""}" onclick="selectLaw('${item.key}')">
            <div class="law-item-title">${item.title}</div>
            <div class="law-item-sub">${item.sub}</div>
          </div>
        `).join("")}
      </div>
    `;
  }).join("");
}

function renderContent() {
  const law = LAWS[state.currentLaw];
  const content = document.getElementById("content");
  const mobileTitle = document.getElementById("mobile-title");

  if (!law) {
    content.innerHTML = `<div class="hint"><div class="hint-icon">👈</div><div class="hint-title">왼쪽 메뉴에서 법령을 선택하세요</div></div>`;
    return;
  }

  mobileTitle.textContent = law.article;

  let html = `
    <div class="law-title-sm">${law.fullName}</div>
    <div class="law-title-lg">${law.article}</div>
    <div class="article-box">
      ${law.segments.map(seg => {
        if (seg.type === "text") return `<span class="text">${escapeHtml(seg.content)}</span>`;
        return `<span class="term ${state.selectedTerm === seg.id ? "active" : ""}" onclick="selectTerm('${seg.id}')">${escapeHtml(seg.content)}</span>`;
      }).join("")}
    </div>
  `;

  if (!state.selectedTerm) {
    html += `
      <div class="hint">
        <div class="hint-icon">☝️</div>
        <div class="hint-title">보라색 워딩을 터치해보세요</div>
        <div class="hint-desc">큐레이션 해설 + 법제처 실시간 판례가 함께 표시됩니다</div>
      </div>
    `;
  } else if (law.terms[state.selectedTerm]) {
    html += renderTermDetail(law.terms[state.selectedTerm]);
  }

  content.innerHTML = html;
}

function renderTermDetail(term) {
  let html = `
    <div class="term-header">
      <div class="term-label">구성요건 해석</div>
      <div class="term-name">"${escapeHtml(term.label)}"</div>
      <div class="term-desc">${escapeHtml(term.desc)}</div>
      ${term.fieldNote ? `<div class="field-note">💡 <strong>현장 포인트</strong><br>${escapeHtml(term.fieldNote)}</div>` : ""}
    </div>
  `;

  if (term.curated && term.curated.length > 0) {
    html += `
      <div class="section-title">
        <span>⭐ 핵심 판례 (매뉴얼 큐레이션)</span>
        <span class="count-badge count-sup">${term.curated.length}건</span>
      </div>
    `;
    term.curated.forEach((c, i) => { html += renderCaseCard(c, `cur-${i}`); });
  }

  html += `
    <div class="section-title">
      <span>🔍 법제처 실시간 검색</span>
      <span class="count-badge count-api">${state.apiResults ? (state.apiResults.filteredCount || 0) + "건" : "로딩"}</span>
    </div>
  `;

  if (state.apiLoading) {
    html += `<div class="loading"><span class="spinner"></span>법제처 API에서 판례 불러오는 중...</div>`;
  } else if (state.apiError) {
    html += `<div class="error">⚠️ ${state.apiError}</div>`;
  } else if (state.apiResults && state.apiResults.items) {
    if (state.apiResults.items.length === 0) {
      html += `<div class="empty-hint">관련 판례를 찾지 못했어요.<br>위 ⭐ 핵심 판례를 참고하세요.</div>`;
    } else {
      state.apiResults.items.forEach((item, i) => { html += renderApiCard(item, `api-${i}`); });
    }
  }

  return html;
}

function renderCaseCard(c, id) {
  const isExpanded = state.expandedCase === id;
  const isSC = c.court && c.court.includes("대법원");
  return `
    <div class="case-card ${isExpanded ? "expanded" : ""}" onclick="toggleCase('${id}')">
      <div class="case-head">
        <div style="flex:1; min-width:0">
          <div class="case-meta">
            <span class="court-tag ${isSC ? "court-sc" : "court-lc"}">${escapeHtml(c.court || "하급심")}</span>
            <span class="case-date">${escapeHtml(c.date || "")}</span>
          </div>
          <div class="case-no">${escapeHtml(c.caseNo || "")}</div>
        </div>
        <div class="arrow ${isExpanded ? "up" : ""}">▼</div>
      </div>
      ${c.keyPoint ? `<div class="key-point">💡 ${escapeHtml(c.keyPoint)}</div>` : ""}
      ${isExpanded ? `
        <div class="case-body">
          <div class="case-summary">
            <div class="summary-label">판결요지</div>
            <div class="summary-text">${escapeHtml(c.summary || "")}</div>
          </div>
          <div class="actions">
            <button class="btn" onclick="copyCase(event, '${id}')">📋 판례 복사</button>
            <button class="btn" onclick="copyCite(event, '${id}')">📝 보고서용 인용</button>
          </div>
        </div>
      ` : ""}
    </div>
  `;
}

function renderApiCard(item, id) {
  const isExpanded = state.expandedCase === id;
  const isSC = item.court && item.court.includes("대법원");
  const cleanName = cleanCaseName(item.caseName);
  return `
    <div class="case-card ${isExpanded ? "expanded" : ""}" onclick="loadAndToggleApi('${id}', '${item.id}')">
      <div class="case-head">
        <div style="flex:1; min-width:0">
          <div class="case-meta">
            <span class="court-tag ${isSC ? "court-sc" : "court-lc"}">${escapeHtml(item.court || "법원")}</span>
            <span class="case-date">${escapeHtml(item.date || "")}</span>
          </div>
          <div class="case-no">${escapeHtml(item.caseNo || "")}</div>
          ${cleanName ? `<div class="case-name">${escapeHtml(cleanName)}</div>` : ""}
        </div>
        <div class="arrow ${isExpanded ? "up" : ""}">▼</div>
      </div>
      ${isExpanded && item._detail ? `
        <div class="case-body">
          <div class="case-summary">
            <div class="summary-label">${item._detail.holding ? "판시사항" : "판결요지"}</div>
            <div class="summary-text">${escapeHtml(item._detail.holding || item._detail.summary || "(본문 참조)")}</div>
          </div>
          <div class="actions">
            <button class="btn" onclick="copyApi(event, '${id}')">📋 판례 복사</button>
          </div>
        </div>
      ` : isExpanded ? `<div class="loading"><span class="spinner"></span>본문 불러오는 중...</div>` : ""}
    </div>
  `;
}

// ============================================
// 헬퍼
// ============================================
function escapeHtml(s) {
  if (s == null) return "";
  return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[c]));
}

function cleanCaseName(name) {
  if (!name) return "";
  const first = name.split(/[·\-]/)[0];
  return first.length > 50 ? first.substring(0, 50) + "..." : first;
}

function filterAndSortApiResults(data) {
  if (!data || !data.items) return { items: [], filteredCount: 0 };
  const items = [...data.items].sort((a, b) => {
    const aSC = (a.court || "").includes("대법원") ? 1 : 0;
    const bSC = (b.court || "").includes("대법원") ? 1 : 0;
    if (aSC !== bSC) return bSC - aSC;
    return (b.date || "").localeCompare(a.date || "");
  });
  return { items: items.slice(0, 15), filteredCount: items.length, totalCnt: data.totalCnt };
}

// ============================================
// 액션
// ============================================
function toggleCategory(idx) {
  state.openCategories[idx] = !state.openCategories[idx];
  renderSidebar();
}

function selectLaw(key) {
  state.currentLaw = key;
  state.selectedTerm = null;
  state.expandedCase = null;
  state.apiResults = null;
  state.apiError = null;
  renderSidebar();
  renderContent();
  if (window.innerWidth <= 900) {
    document.getElementById("sidebar").classList.remove("open");
    document.getElementById("overlay").classList.remove("show");
  }
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function selectTerm(id) {
  if (state.selectedTerm === id) {
    state.selectedTerm = null;
  } else {
    state.selectedTerm = id;
    state.expandedCase = null;
    fetchPrecedents();
  }
  renderContent();
}

function toggleCase(id) {
  state.expandedCase = state.expandedCase === id ? null : id;
  renderContent();
}

async function loadAndToggleApi(cardId, precId) {
  if (state.expandedCase === cardId) {
    state.expandedCase = null;
    renderContent();
    return;
  }
  state.expandedCase = cardId;
  renderContent();

  const idx = parseInt(cardId.split("-")[1]);
  const item = state.apiResults.items[idx];
  if (item && item._detail) return;

  try {
    const res = await fetch(`/api/precedents?id=${encodeURIComponent(precId)}`);
    const data = await res.json();
    if (item) item._detail = data;
    renderContent();
  } catch (e) {
    if (item) item._detail = { summary: "본문 로드 실패" };
    renderContent();
  }
}

async function fetchPrecedents() {
  const law = LAWS[state.currentLaw];
  const term = law.terms[state.selectedTerm];
  if (!term || !term.searchKeyword) return;

  state.apiLoading = true;
  state.apiError = null;
  state.apiResults = null;
  renderContent();

  try {
    const res = await fetch(`/api/precedents?query=${encodeURIComponent(term.searchKeyword)}`);
    if (!res.ok) throw new Error("API 응답 오류");
    const data = await res.json();
    state.apiResults = filterAndSortApiResults(data);
  } catch (e) {
    state.apiError = "법제처 API 연결 실패: " + e.message;
  } finally {
    state.apiLoading = false;
    renderContent();
  }
}

function copyCase(e, id) {
  e.stopPropagation();
  const term = LAWS[state.currentLaw].terms[state.selectedTerm];
  const idx = parseInt(id.split("-")[1]);
  const c = term.curated[idx];
  const text = `${c.court} ${c.caseNo} (${c.date} 선고)\n\n[판결요지]\n${c.summary}`;
  navigator.clipboard.writeText(text);
  flashBtn(e.target);
}

function copyCite(e, id) {
  e.stopPropagation();
  const term = LAWS[state.currentLaw].terms[state.selectedTerm];
  const idx = parseInt(id.split("-")[1]);
  const c = term.curated[idx];
  const text = `${c.court} ${c.caseNo} (${c.date} 선고) 참조 — ${c.keyPoint}`;
  navigator.clipboard.writeText(text);
  flashBtn(e.target);
}

function copyApi(e, id) {
  e.stopPropagation();
  const idx = parseInt(id.split("-")[1]);
  const item = state.apiResults.items[idx];
  const d = item._detail || {};
  const text = `${item.court} ${item.caseNo} (${item.date} 선고)\n${item.caseName || ""}\n\n${d.holding || d.summary || ""}`;
  navigator.clipboard.writeText(text);
  flashBtn(e.target);
}

function flashBtn(btn) {
  btn.classList.add("success");
  const orig = btn.textContent;
  btn.textContent = "✓ 복사됨";
  setTimeout(() => {
    btn.classList.remove("success");
    btn.textContent = orig;
  }, 1500);
}

function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("open");
  document.getElementById("overlay").classList.toggle("show");
}

renderSidebar();
renderContent();
</script>

</body>
</html>
