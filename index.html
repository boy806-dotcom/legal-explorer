            keyPoint: "유형력 없어도 정서적 학대 성립",
            summary: "아동복지법 제17조 제5호의 행위는 유형력 행사를 동반하지 아니한 정서적 학대행위나 유형력을 행사하였으나 신체의 손상에까지 이르지는 않고 정서적 학대에 해당하는 행위를 가리킨다."
          },
          {
            caseNo: "2017도5769",
            court: "대법원",
            date: "2020. 3. 12.",
            keyPoint: "정서적 학대 판단 9가지 기준",
            summary: "정서적 학대의 판단기준으로, 행위자와 아동의 관계, 행위 당시 행위자가 아동에게 보인 태도, 아동의 연령·성별·성향·정신적 발달상태 및 건강상태, 행위에 대한 아동의 반응 및 행위 전후 아동의 상태 변화, 행위의 발생장소와 시기, 행위의 정도와 태양, 행위에 이르게 된 경위, 행위의 반복성이나 기간, 행위가 아동 정신건강의 정상적 발달에 미치는 영향 등을 종합적으로 고려하여 판단하여야 한다."
          }
        ]
      }
    }
  }
};

// ============================================
// 상태 관리
// ============================================
let state = {
  currentLaw: "stalking",
  selectedTerm: null,
  expandedCase: null,
  apiResults: null,
  apiLoading: false,
  apiError: null
};

// ============================================
// 렌더링
// ============================================
function renderLawSelector() {
  const el = document.getElementById("law-selector");
  el.innerHTML = Object.entries(LAWS).map(([key, law]) =>
    `<button class="law-btn ${state.currentLaw === key ? "active" : ""}" onclick="selectLaw('${key}')">${law.shortName}</button>`
  ).join("");
}

function renderContent() {
  const law = LAWS[state.currentLaw];
  const content = document.getElementById("content");

  let html = `
    <div class="law-title-sm">${law.fullName}</div>
    <div class="law-title-lg">${law.article}</div>
    <div class="article-box">
      ${law.segments.map(seg => {
        if (seg.type === "text") return `<span class="text">${seg.content}</span>`;
        return `<span class="term ${state.selectedTerm === seg.id ? "active" : ""}" onclick="selectTerm('${seg.id}')">${seg.content}</span>`;
      }).join("")}
    </div>
  `;

  if (!state.selectedTerm) {
    html += `
      <div class="hint">
        <div class="hint-icon">☝️</div>
        <div class="hint-title">보라색 워딩을 터치해보세요</div>
        <div class="hint-desc">큐레이션 판례 + 법제처 실시간 판례가 함께 표시됩니다</div>
      </div>
    `;
  } else {
    const term = law.terms[state.selectedTerm];
    html += renderTermDetail(term);
  }

  content.innerHTML = html;
}

function renderTermDetail(term) {
  let html = `
    <div class="term-header">
      <div class="term-label">구성요건 해석</div>
      <div class="term-name">"${term.label}"</div>
      <div class="term-desc">${term.desc}</div>
    </div>
  `;

  // 큐레이션 판례
  if (term.curated && term.curated.length > 0) {
    html += `
      <div class="section-title">
        <span>⭐ 핵심 판례 (큐레이션)</span>
        <span class="count-badge count-sup">${term.curated.length}건</span>
      </div>
    `;
    term.curated.forEach((c, i) => {
      html += renderCaseCard(c, `cur-${i}`, false);
    });
  }

  // API 결과
  html += `
    <div class="section-title">
      <span>🔍 법제처 실시간 검색</span>
      <span class="count-badge count-api">${state.apiResults ? state.apiResults.totalCnt + "건 중 상위 " + (state.apiResults.items?.length || 0) : "로딩"}</span>
    </div>
  `;

  if (state.apiLoading) {
    html += `<div class="loading"><span class="spinner"></span>법제처 API에서 판례 불러오는 중...</div>`;
  } else if (state.apiError) {
    html += `<div class="error">⚠️ ${state.apiError}</div>`;
  } else if (state.apiResults && state.apiResults.items) {
    if (state.apiResults.items.length === 0) {
      html += `<div class="loading">검색 결과가 없습니다</div>`;
    } else {
      state.apiResults.items.forEach((item, i) => {
        html += renderApiCard(item, `api-${i}`);
      });
    }
  }

  return html;
}

function renderCaseCard(c, id, isApi) {
  const isExpanded = state.expandedCase === id;
  const isSC = c.court && c.court.includes("대법원");
  return `
    <div class="case-card ${isExpanded ? "expanded" : ""}" onclick="toggleCase('${id}')">
      <div class="case-head">
        <div style="flex:1; min-width:0">
          <div class="case-meta">
            <span class="court-tag ${isSC ? "court-sc" : "court-lc"}">${c.court || "하급심"}</span>
            <span class="case-date">${c.date || ""}</span>
          </div>
          <div class="case-no">${c.caseNo || ""}</div>
          ${c.caseName ? `<div class="case-name">${c.caseName}</div>` : ""}
        </div>
        <div class="arrow ${isExpanded ? "up" : ""}">▼</div>
      </div>
      ${c.keyPoint ? `<div class="key-point">💡 ${c.keyPoint}</div>` : ""}
      ${isExpanded ? `
        <div class="case-body">
          <div class="case-summary">
            <div class="summary-label">판결요지</div>
            <div class="summary-text">${c.summary || "(요지 정보 없음)"}</div>
          </div>
          <div class="actions">
            <button class="btn" onclick="copyCase(event, '${id}')">📋 판례 복사</button>
            <button class="btn" onclick="copyCite(event, '${id}')">📝 보고서용 인용</button>
          </div>
        </div>
      ` : ""}
    </div>
  `;
}

function renderApiCard(item, id) {
  const isExpanded = state.expandedCase === id;
  const isSC = item.court && item.court.includes("대법원");
  return `
    <div class="case-card ${isExpanded ? "expanded" : ""}" onclick="loadAndToggleApi('${id}', '${item.id}')">
      <div class="case-head">
        <div style="flex:1; min-width:0">
          <div class="case-meta">
            <span class="court-tag ${isSC ? "court-sc" : "court-lc"}">${item.court || "법원"}</span>
            <span class="case-date">${item.date || ""}</span>
            <span class="case-date">${item.caseType || ""}</span>
          </div>
          <div class="case-no">${item.caseNo || ""}</div>
          ${item.caseName ? `<div class="case-name">${item.caseName}</div>` : ""}
        </div>
        <div class="arrow ${isExpanded ? "up" : ""}">▼</div>
      </div>
      ${isExpanded && item._detail ? `
        <div class="case-body">
          <div class="case-summary">
            <div class="summary-label">판시사항 / 판결요지</div>
            <div class="summary-text">${item._detail.summary || item._detail.holding || "(요지 없음 — 본문 참조)"}</div>
          </div>
          <div class="actions">
            <button class="btn" onclick="copyApi(event, '${id}')">📋 판례 복사</button>
          </div>
        </div>
      ` : isExpanded ? `<div class="loading"><span class="spinner"></span>본문 불러오는 중...</div>` : ""}
    </div>
  `;
}

// ============================================
// 액션
// ============================================
function selectLaw(key) {
  state.currentLaw = key;
  state.selectedTerm = null;
  state.expandedCase = null;
  state.apiResults = null;
  state.apiError = null;
  renderLawSelector();
  renderContent();
}

function selectTerm(id) {
  if (state.selectedTerm === id) {
    state.selectedTerm = null;
  } else {
    state.selectedTerm = id;
    state.expandedCase = null;
    fetchPrecedents();
  }
  renderContent();
}

function toggleCase(id) {
  state.expandedCase = state.expandedCase === id ? null : id;
  renderContent();
}

async function loadAndToggleApi(cardId, precId) {
  if (state.expandedCase === cardId) {
    state.expandedCase = null;
    renderContent();
    return;
  }
  state.expandedCase = cardId;
  renderContent();

  // 이미 로드된 경우 스킵
  const item = state.apiResults.items.find(i => `api-${state.apiResults.items.indexOf(i)}` === cardId);
  if (item && item._detail) return;

  try {
    const res = await fetch(`/api/precedents?id=${encodeURIComponent(precId)}`);
    const data = await res.json();
    if (item) item._detail = data;
    renderContent();
  } catch (e) {
    if (item) item._detail = { summary: "본문 로드 실패" };
    renderContent();
  }
}

async function fetchPrecedents() {
  const law = LAWS[state.currentLaw];
  const term = law.terms[state.selectedTerm];
  if (!term.searchKeyword) return;

  state.apiLoading = true;
  state.apiError = null;
  state.apiResults = null;
  renderContent();

  try {
    const res = await fetch(`/api/precedents?query=${encodeURIComponent(term.searchKeyword)}`);
    if (!res.ok) throw new Error("API 응답 오류");
    const data = await res.json();
    state.apiResults = data;
  } catch (e) {
    state.apiError = "법제처 API 연결 실패: " + e.message;
  } finally {
    state.apiLoading = false;
    renderContent();
  }
}

function copyCase(e, id) {
  e.stopPropagation();
  const law = LAWS[state.currentLaw];
  const term = law.terms[state.selectedTerm];
  const idx = parseInt(id.split("-")[1]);
  const c = term.curated[idx];
  const text = `${c.court} ${c.caseNo} (${c.date} 선고)\n\n[판결요지]\n${c.summary}`;
  navigator.clipboard.writeText(text);
  flashBtn(e.target);
}

function copyCite(e, id) {
  e.stopPropagation();
  const law = LAWS[state.currentLaw];
  const term = law.terms[state.selectedTerm];
  const idx = parseInt(id.split("-")[1]);
  const c = term.curated[idx];
  const text = `${c.court} ${c.caseNo} (${c.date} 선고) 참조 — ${c.keyPoint}`;
  navigator.clipboard.writeText(text);
  flashBtn(e.target);
}

function copyApi(e, id) {
  e.stopPropagation();
  const idx = parseInt(id.split("-")[1]);
  const item = state.apiResults.items[idx];
  const d = item._detail || {};
  const text = `${item.court} ${item.caseNo} (${item.date} 선고)\n${item.caseName || ""}\n\n${d.summary || d.holding || ""}`;
  navigator.clipboard.writeText(text);
  flashBtn(e.target);
}

function flashBtn(btn) {
  btn.classList.add("success");
  const orig = btn.textContent;
  btn.textContent = "✓ 복사됨";
  setTimeout(() => {
    btn.classList.remove("success");
    btn.textContent = orig;
  }, 1500);
}

// 초기 렌더링
renderLawSelector();
renderContent();
</script>

<div class="container" style="padding-top:0">
  <div class="footer">
    ⚖️ 법제처 Open API 기반 · 현직 경찰관 큐레이션<br>
    본 도구는 수사 참고용이며 정식 법률 해석은 판례 원문 확인 필요
  </div>
</div>
